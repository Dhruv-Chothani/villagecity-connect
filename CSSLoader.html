<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Loader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }
        
        .loader-ring {
            animation: spin 1s linear infinite;
        }
        
        .loader-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .loader-bounce {
            animation: bounce 1s infinite;
        }
        
        .loader-ping {
            animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center">
    <div class="text-center">
        <!-- Main Loader -->
        <div class="relative inline-block mb-8">
            <div class="loader-ring h-16 w-16 border-4 border-blue-200 border-t-blue-600 rounded-full"></div>
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="loader-pulse h-8 w-8 bg-blue-600 rounded-full"></div>
            </div>
            
            <!-- Orbiting dots -->
            <div class="absolute -inset-4">
                <div class="loader-ping absolute top-0 left-1/2 h-2 w-2 -translate-x-1/2 -translate-y-1 bg-blue-600 rounded-full"></div>
                <div class="loader-ping absolute bottom-0 left-1/2 h-2 w-2 -translate-x-1/2 translate-y-1 bg-green-600 rounded-full" style="animation-delay: 0.2s"></div>
                <div class="loader-ping absolute left-0 top-1/2 h-2 w-2 -translate-y-1/2 -translate-x-1 bg-yellow-600 rounded-full" style="animation-delay: 0.4s"></div>
                <div class="loader-ping absolute right-0 top-1/2 h-2 w-2 -translate-y-1/2 translate-x-1 bg-red-600 rounded-full" style="animation-delay: 0.6s"></div>
            </div>
        </div>
        
        <!-- Loading Text -->
        <div class="mb-4">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Loading...</h2>
            <p class="text-gray-600">Connecting communities, building futures</p>
        </div>
        
        <!-- Progress Bar -->
        <div class="w-64 h-2 bg-gray-200 rounded-full overflow-hidden mb-8">
            <div class="loader-pulse h-full bg-gradient-to-r from-blue-600 to-green-600 rounded-full"></div>
        </div>
        
        <!-- Floating Elements -->
        <div class="relative">
            <div class="loader-bounce absolute top-0 left-10 h-4 w-4 bg-blue-200 rounded-full"></div>
            <div class="loader-bounce absolute top-0 right-10 h-3 w-3 bg-green-200 rounded-full" style="animation-delay: 0.2s"></div>
            <div class="loader-bounce absolute top-0 left-20 h-5 w-5 bg-yellow-200 rounded-full" style="animation-delay: 0.4s"></div>
        </div>
    </div>
</body>
</html>
