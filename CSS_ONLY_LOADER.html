<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Loader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        
        .loader-container {
            text-align: center;
        }
        
        .main-spinner {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }
        
        .spinner-ring {
            width: 64px;
            height: 64px;
            border: 4px solid #dbeafe;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .spinner-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            background: #2563eb;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .orbit-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: ping 1s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
        
        .orbit-dot:nth-child(1) {
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            background: #2563eb;
        }
        
        .orbit-dot:nth-child(2) {
            bottom: -16px;
            left: 50%;
            transform: translateX(-50%);
            background: #16a34a;
            animation-delay: 200ms;
        }
        
        .orbit-dot:nth-child(3) {
            left: -16px;
            top: 50%;
            transform: translateY(-50%);
            background: #eab308;
            animation-delay: 400ms;
        }
        
        .orbit-dot:nth-child(4) {
            right: -16px;
            top: 50%;
            transform: translateY(-50%);
            background: #dc2626;
            animation-delay: 600ms;
        }
        
        .loading-text h2 {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 8px;
        }
        
        .loading-text p {
            color: #6b7280;
            font-size: 14px;
        }
        
        .progress-bar {
            width: 256px;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin: 2rem auto;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #2563eb, #16a34a);
            border-radius: 4px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .floating-bubble {
            position: absolute;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }
        
        .bubble-1 {
            width: 16px;
            height: 16px;
            background: #dbeafe;
            top: 40px;
            left: 40px;
        }
        
        .bubble-2 {
            width: 12px;
            height: 12px;
            background: #d1fae5;
            top: 80px;
            right: 80px;
            animation-delay: 200ms;
        }
        
        .bubble-3 {
            width: 20px;
            height: 20px;
            background: #fef3c7;
            bottom: 80px;
            left: 80px;
            animation-delay: 400ms;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes ping {
            75%, 100% {
                transform: scale(2);
                opacity: 0;
            }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <!-- Main Spinner -->
        <div class="main-spinner">
            <div class="spinner-ring"></div>
            <div class="spinner-dot"></div>
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>
            <div class="orbit-dot"></div>
        </div>
        
        <!-- Loading Text -->
        <div class="loading-text">
            <h2>Loading...</h2>
            <p>Connecting communities, building futures</p>
        </div>
        
        <!-- Progress Bar -->
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <!-- Floating Bubbles -->
        <div class="floating-bubble bubble-1"></div>
        <div class="floating-bubble bubble-2"></div>
        <div class="floating-bubble bubble-3"></div>
    </div>
</body>
</html>
